name: Sync NeurIPS-submit branch

on:
  push:
    branches:
      - copilot/neurips-submit

jobs:
  sync-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or force-update NeurIPS-submit branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:refs/heads/NeurIPS-submit --force
